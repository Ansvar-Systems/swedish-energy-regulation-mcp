name: Gitleaks

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

jobs:
  gitleaks:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: zricethezav/gitleaks-action@v2
        with:
          args: detect --source .
        env:
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}
